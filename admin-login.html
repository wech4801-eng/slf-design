<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Connexion Admin · SLF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00843D; --green-dark: #006830; --green-light: #e8f5ee;
      --red: #CE1126; --white: #FFFFFF;
      --gray-50: #f8f9fa; --gray-100: #f1f3f5; --gray-200: #e9ecef;
      --gray-400: #adb5bd; --gray-600: #6c757d; --gray-800: #343a40; --gray-900: #212529;
      --font: 'Inter', sans-serif;
      --shadow-md: 0 4px 24px rgba(0,0,0,.12);
    }
    body {
      font-family: var(--font);
      background: linear-gradient(135deg, var(--green-dark) 0%, #004d2a 50%, #8B0000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Animated background pattern */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(206,17,38,.15) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Flag stripe */
    .flag-stripe {
      display: flex; width: 100%; height: 5px;
      border-radius: 5px 5px 0 0; overflow: hidden;
      margin-bottom: 0;
    }
    .flag-stripe .g { flex:1; background: var(--green); }
    .flag-stripe .w { flex:1; background: rgba(255,255,255,.6); }
    .flag-stripe .r { flex:1; background: var(--red); }

    .login-card {
      width: 100%; max-width: 400px;
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      position: relative;
    }

    .login-header {
      background: var(--green-dark);
      padding: 28px 32px;
      text-align: center;
      color: var(--white);
    }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px;
    }
    .logo-flag {
      width: 40px; height: 26px; border-radius: 4px; overflow: hidden;
      display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .logo-flag span { flex: 1; }
    .logo-flag .g { background: var(--green); }
    .logo-flag .w { background: var(--white); }
    .logo-flag .r { background: var(--red); }
    .login-site-name { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .login-tagline   { font-size: 12px; opacity: .7; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 5px 14px; font-size: 12px; font-weight: 600;
      margin-top: 12px;
    }
    .login-badge svg { width: 12px; height: 12px; }

    .login-body { padding: 28px 28px 32px; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--gray-800); margin-bottom: 6px;
    }
    .form-input-wrap { position: relative; }
    .form-input-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--gray-400);
    }
    .form-input {
      width: 100%; padding: 12px 12px 12px 40px;
      border: 2px solid var(--gray-200); border-radius: 10px;
      font-size: 14px; font-family: var(--font);
      color: var(--gray-900); background: var(--gray-50);
      transition: border-color .15s, background .15s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--green); background: var(--white);
    }
    .form-input::placeholder { color: var(--gray-400); }

    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600); cursor: pointer; }
    .remember input { accent-color: var(--green); width: 15px; height: 15px; }
    .forgot { font-size: 13px; color: var(--green); font-weight: 500; }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: 14px;
      background: var(--green);
      color: var(--white);
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login svg { width: 16px; height: 16px; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--gray-400); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-200);
    }

    .security-info {
      display: flex; align-items: center; gap: 8px;
      background: var(--green-light); border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: var(--green-dark);
      margin-top: 20px;
    }
    .security-info svg { width: 14px; height: 14px; flex-shrink: 0; }

    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 20px; font-size: 13px; color: rgba(255,255,255,.75);
      transition: color .15s;
    }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 14px; height: 14px; }

    /* Error state */
    .form-error {
      font-size: 12px; color: var(--red); margin-top: 4px;
      display: none; align-items: center; gap: 4px;
    }
    .form-input.error { border-color: var(--red); }
  </style>

  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body>

  <div class="login-card">
    <div class="flag-stripe"><span class="g"></span><span class="w"></span><span class="r"></span></div>

    <div class="login-header">
      <div class="logo-wrap">
        <div class="logo-flag"><span class="g"></span><span class="w"></span><span class="r"></span></div>
        <span class="login-site-name">SLF</span>
      </div>
      <div class="login-tagline">Somaliland France</div>
      <div class="login-badge">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Espace administrateur
      </div>
    </div>

    <div class="login-body">
      <form onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label" for="username">Identifiant</label>
          <div class="form-input-wrap">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="form-input-wrap">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <input type="password" id="password" class="form-input" placeholder="••••••••••••" autocomplete="current-password" />
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" /> Se souvenir de moi
          </label>
          <a href="mailto:aslf.lyon@gmail.com" class="forgot">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          Se connecter
        </button>

        <div id="loginError" style="display:none; margin-top:14px; padding:10px 14px; background:#fdecea; border-radius:8px; font-size:13px; color:#ce1126; display:none; align-items:center; gap:8px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          Identifiant ou mot de passe incorrect.
        </div>

        <div class="security-info">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Connexion sécurisée · Zone réservée aux administrateurs SLF
        </div>

      </form>
    </div>
  </div>

  <a href="index.html" class="back-link">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Retour au site public
  </a>

  <script src="admin-auth.js?v=5"></script>
  <script src="slf-db.js?v=6"></script>
  <script>
    // Si déjà connecté, rediriger directement vers le dashboard
    if (SLFAuth.isAuthenticated()) {
      window.location.replace('admin-dashboard.html');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errBox   = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Vérification…';

      // 1) Authentification locale (SHA-256) — protège l'UI
      const okLocal = await SLFAuth.login(username, password);
      // 2) Authentification serveur — émet un token API pour les écritures
      let okApi = false;
      try { okApi = await SLFDB.login(password); } catch {}

      const ok = okLocal; // Local suffit pour entrer dans l'UI

      if (ok) {
        btn.textContent = 'Connexion…';
        errBox.style.display = 'none';
        if (!okApi) {
          console.warn('[SLF] Connexion locale OK mais token API non émis (serveur indisponible). Les écritures iront en localStorage.');
        }
        setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 400);
      } else {
        btn.disabled = false;
        btn.innerHTML = `
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          Se connecter`;
        errBox.style.display = 'flex';
        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shake .4s ease';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
  </style>
</body>
</html>
