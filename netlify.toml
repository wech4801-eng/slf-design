# ── Configuration Netlify pour le site SLF ──────────────────────
# Hébergement statique sans build (HTML/CSS/JS pur)

[build]
  publish = "."

# ── En-têtes de sécurité ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Sécurité
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
    # Content Security Policy — autorise les fonts Google et les iframes YouTube/Vimeo
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.youtube.com https://player.vimeo.com; connect-src 'self'"

# ── Cache long pour les assets statiques ────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirections ────────────────────────────────────────────────
# Page 404 personnalisée (Netlify la détecte automatiquement via 404.html)
